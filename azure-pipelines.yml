trigger:
  - main

pool:
  vmImage: 'ubuntu-22.04'

steps:
  - task: UseDotNet@2
    inputs:
      version: '9.0.x'
      
  - script: ls -R
    displayName: Show repo structure
    
  - script: docker --version || (echo "Docker not found" && exit 1)
    displayName: Check Docker

  - script: docker info || (echo "Docker daemon not available" && exit 1)
    displayName: Verify Docker daemon

  - script: dotnet restore
    displayName: Restore

  - script: dotnet build --no-restore
    displayName: Build

  - script: |
      dotnet test ./KnowledgeVault.Api.Tests/KnowledgeVault.Api.Tests.csproj --no-build -v diag --logger "trx;LogFileName=tests.trx" > test_output.log 2>&1 || true
    displayName: Run tests (diag, capture)

  - script: |
      tail -n 2000 test_output.log
    displayName: Show test log

  - task: PublishTestResults@2
    inputs:
      testResultsFormat: 'VSTest'
      testResultsFiles: '**/tests.trx'
      failTaskOnFailedTests: true
    
  - task: Docker@2
    displayName: Build Docker Image
    inputs:
      command: build
      repository: knowledgevault-api
      Dockerfile: '**/Dockerfile'
      tags: |
        $(Build.BuildId)